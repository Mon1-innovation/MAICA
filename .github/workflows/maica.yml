name: MAICA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run static checks
        run: python -m ruff check maica tests examples

      - name: Validate installed dependencies
        run: python -m pip check

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: dist/
          retention-days: 1

  release-status:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      pypi-exists: ${{ steps.pypi_version.outputs.exists }}
      version: ${{ steps.pypi_version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist/

      - name: Check whether this version already exists on PyPI
        id: pypi_version
        shell: bash
        run: |
          python - <<'PY'
          import email
          import glob
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          import zipfile

          wheel = glob.glob("dist/*.whl")
          if len(wheel) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheel)}")

          with zipfile.ZipFile(wheel[0]) as archive:
              metadata_name = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              metadata = email.message_from_bytes(archive.read(metadata_name))

          version = metadata["Version"]
          url = f"https://pypi.org/pypi/mi-maica/{urllib.parse.quote(version, safe='')}/json"
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              exists = False

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")
              output.write(f"exists={'true' if exists else 'false'}\n")
          print(f"mi-maica {version} {'already exists' if exists else 'is not present'} on PyPI")
          PY

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build, release-status]
    environment: pypi
    permissions:
      id-token: write
    if: needs.release-status.outputs.pypi-exists == 'false'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Handles the race where another run publishes after release-status.
          skip-existing: true

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist/

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          VERSION=$(sed -n "s/^MAICA_CURR_VERSION *= *'\([^']*\)'.*/\1/p" maica/env_basis)
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check for an existing tag
        id: check_tag
        shell: bash
        run: |
          if git rev-parse --verify --quiet "refs/tags/v${{ steps.get_version.outputs.version }}"; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Git tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"

      - name: Create GitHub release
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: Automated release for MAICA version ${{ steps.get_version.outputs.version }}
          files: dist/*
